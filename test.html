<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息卡片</title>
    <style>
        /* --- CSS样式部分--- */
        
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f0f2f5; /* 默认背景色，当没有图片时显示 */
            --bg-image: none;    /* 背景图变量 */
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #333;
            --text-secondary: #666;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* 背景设置 */
            background-color: var(--bg-color);
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* 背景固定，滚动时不动 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
            transition: all 0.4s ease;
        }

        /* 卡片容器 - 毛玻璃效果 */
        .card {
            background-color: var(--card-bg);
            width: 360px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            backdrop-filter: blur(10px); /* 模糊背景 */
            -webkit-backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card:hover { transform: translateY(-5px); }

        /* 头像区域 */
        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #avatar-upload { display: none; }

        .upload-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 12px;
            opacity: 0; transition: opacity 0.3s;
            cursor: pointer;
        }

        .avatar-container:hover .upload-overlay { opacity: 1; }

        /* 输入框与文本 */
        .name-input, .bio-input {
            width: 100%; padding: 10px; margin-bottom: 15px;
            border: 1px solid #ddd; border-radius: 8px;
            font-size: 16px; outline: none; text-align: center;
        }

        .name-display { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .bio-display { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

        /* 按钮 */
        .btn {
            border: none; padding: 12px 30px; border-radius: 25px;
            font-size: 16px; cursor: pointer; transition: all 0.3s;
            margin-top: 10px; color: white;
        }
        .save-btn { background-color: var(--primary-color); }
        .save-btn:hover { background-color: #357abd; }
        .edit-btn { background-color: #6c757d; }

        /* 底部设置区域 */
        .theme-selector {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        
        .control-group { text-align: center; }
        .control-label { font-size: 12px; color: #888; margin-bottom: 8px; display: block; }

        /* 图片上传按钮样式 */
        .img-upload-label {
            display: inline-block;
            padding: 8px 16px;
            background: #f0f0f0;
            border: 1px dashed #ccc;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            color: #555;
            transition: all 0.2s;
        }
        .img-upload-label:hover { background: #e0e0e0; border-color: #999; }
        #bg-upload { display: none; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <!-- 头像 -->
        <div class="avatar-container">
            <img src="https://via.placeholder.com/150" alt="头像" class="avatar" id="avatar-img">
            <label for="avatar-upload" class="upload-overlay"><span>更换头像</span></label>
            <input type="file" id="avatar-upload" accept="image/*">
        </div>

        <!-- 编辑区 -->
        <div id="edit-fields">
            <input type="text" id="name-input" class="name-input" placeholder="姓名">
            <textarea id="bio-input" class="bio-input" rows="3" placeholder="简介"></textarea>
        </div>

        <!-- 展示区 -->
        <div id="view-fields" class="hidden">
            <h2 class="name-display" id="name-display"></h2>
            <p class="bio-display" id="bio-display"></p>
        </div>

        <!-- 按钮 -->
        <button id="save-btn" class="btn save-btn">保存信息</button>
        <button id="edit-btn" class="btn edit-btn hidden">重新编辑</button>

        <!-- 外观设置面板：仅保留背景图上传 -->
        <div class="theme-selector">
            <div class="control-group">
                <span class="control-label">点击按钮更换网页背景图片</span>
                <label for="bg-upload" class="img-upload-label">
                    📷 选择图片
                </label>
                <input type="file" id="bg-upload" accept="image/*">
            </div>
        </div>
    </div>

    <script>
        /* --- JavaScript 功能部分 --- */
        
        const avatarInput = document.getElementById('avatar-upload');
        const avatarImg = document.getElementById('avatar-img');
        const nameInput = document.getElementById('name-input');
        const bioInput = document.getElementById('bio-input');
        const nameDisplay = document.getElementById('name-display');
        const bioDisplay = document.getElementById('bio-display');
        const editFields = document.getElementById('edit-fields');
        const viewFields = document.getElementById('view-fields');
        const saveBtn = document.getElementById('save-btn');
        const editBtn = document.getElementById('edit-btn');
        const root = document.documentElement;

        // 1. 头像上传
        avatarInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) { avatarImg.src = e.target.result; }
                reader.readAsDataURL(file);
            }
        });

        // 2. 保存与编辑切换
        saveBtn.addEventListener('click', function() {
            nameDisplay.textContent = nameInput.value || '未填写姓名';
            bioDisplay.textContent = bioInput.value || '未填写简介';
            editFields.classList.add('hidden');
            viewFields.classList.remove('hidden');
            saveBtn.classList.add('hidden');
            editBtn.classList.remove('hidden');
        });

        editBtn.addEventListener('click', function() {
            viewFields.classList.add('hidden');
            editFields.classList.remove('hidden');
            editBtn.classList.add('hidden');
            saveBtn.classList.remove('hidden');
        });

        // 3. 背景图片上传逻辑
        const bgInput = document.getElementById('bg-upload');

        bgInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // 将图片设置为 body 的背景
                    root.style.setProperty('--bg-image', `url(${e.target.result})`);
                }
                reader.readAsDataURL(file);
            }
        });

    </script>
</body>
</html>
